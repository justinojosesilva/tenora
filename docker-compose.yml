services:
  postgres:
    image: postgres:16-alpine
    platform: linux/arm64 # ← adiciona isso
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports: ['5432:5432']
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports: ['6379:6379']

  bullboard: # dashboard visual das filas BullMQ
    image: deadly0/bull-board
    platform: linux/amd64 # ← bull-board só tem amd64, usa emulação
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports: ['3002:3000']
    depends_on: [redis]

volumes:
  pgdata:
