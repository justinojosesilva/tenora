name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true # cancela runs antigas do mesmo PR

jobs:
  test:
    name: Testes de integração (RLS + banco)
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tenora_test
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://tenora_app:tenora123@localhost:5432/tenora_test
      DATABASE_URL_MIGRATOR: postgresql://tenora_migrator:migrator123@localhost:5432/tenora_test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Obter caminho do cache pnpm
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Setup roles do banco
        run: |
          psql postgresql://postgres:postgres@localhost:5432/tenora_test <<'SQL'
            CREATE ROLE tenora_migrator LOGIN PASSWORD 'migrator123' NOSUPERUSER NOBYPASSRLS;
            CREATE ROLE tenora_app     LOGIN PASSWORD 'tenora123'   NOSUPERUSER NOBYPASSRLS NOINHERIT;
            GRANT ALL PRIVILEGES ON DATABASE tenora_test TO tenora_migrator;
            GRANT ALL ON SCHEMA public TO tenora_migrator;
            GRANT CONNECT ON DATABASE tenora_test TO tenora_app;
            GRANT USAGE ON SCHEMA public TO tenora_app;
          SQL

      - name: Generate Prisma Client
        run: pnpm --filter @tenora/db exec prisma generate

      - name: Run migrations
        run: pnpm --filter @tenora/db exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ env.DATABASE_URL_MIGRATOR }}

      - name: Conceder permissões ao app user
        run: |
          psql postgresql://postgres:postgres@localhost:5432/tenora_test <<'SQL'
            GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO tenora_app;
            GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO tenora_app;
          SQL

      - name: Run tests
        run: pnpm --filter @tenora/db test
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          DATABASE_URL_MIGRATOR: ${{ env.DATABASE_URL_MIGRATOR }}
  ci:
    name: Lint, type-check, test e build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 1. Checkout do código
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # necessário para o Turborepo detectar mudanças

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Setup pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      # 4. Cache pnpm store
      - name: Obter caminho do cache pnpm
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      # 5. Cache Turborepo
      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      # 6. Instalar dependências
      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      # 7. Lint
      - name: Lint
        run: pnpm lint

      # 8. Type-check
      - name: Type-check
        run: pnpm type-check

      # 9. Testes (db é testado no job dedicado com Postgres)
      - name: Testes
        run: pnpm turbo test --filter=!@tenora/db

      # 10. Build
      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_dGVzdC5jbGVyay5hY2NvdW50cyQ=

  e2e:
    name: Testes E2E (smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: ci # roda somente após lint/type-check/test/build passarem

    # Roda apenas quando as secrets de staging estiverem configuradas
    if: |
      vars.E2E_BASE_URL != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Obter caminho do cache pnpm
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      # Instala apenas o Chromium para reduzir tempo de download
      - name: Instalar Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Rodar testes E2E
        run: pnpm --filter @tenora/web e2e
        env:
          E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}
          E2E_API_URL: ${{ vars.E2E_API_URL }}
          E2E_USER_A_EMAIL: ${{ secrets.E2E_USER_A_EMAIL }}
          E2E_USER_A_PASSWORD: ${{ secrets.E2E_USER_A_PASSWORD }}
          E2E_USER_B_EMAIL: ${{ secrets.E2E_USER_B_EMAIL }}
          E2E_USER_B_PASSWORD: ${{ secrets.E2E_USER_B_PASSWORD }}

      # Faz upload do relatório HTML e screenshots em caso de falha
      - name: Upload relatório Playwright
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: apps/web/playwright-report/
          retention-days: 7
