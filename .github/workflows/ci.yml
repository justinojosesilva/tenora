name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true # cancela runs antigas do mesmo PR

jobs:
  ci:
    name: Lint, type-check, test e build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 1. Checkout do código
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # necessário para o Turborepo detectar mudanças

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 3. Setup pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      # 4. Cache pnpm store
      - name: Obter caminho do cache pnpm
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      # 5. Cache Turborepo
      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      # 6. Instalar dependências
      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      # 7. Lint
      - name: Lint
        run: pnpm lint

      # 8. Type-check
      - name: Type-check
        run: pnpm type-check

      # 9. Testes
      - name: Testes
        run: pnpm test

      # 10. Build
      - name: Build
        run: pnpm build
