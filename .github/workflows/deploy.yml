name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # never cancel an in-flight deploy

jobs:
  # ── Staging: auto on every push to main ─────────────────────────────────
  migrate-staging:
    name: Migrate (staging)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: $(pnpm store path --silent)
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Gerar Prisma Client
        run: pnpm --filter @tenora/db db:generate

      - name: Aplicar migrations (staging)
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          DATABASE_URL_MIGRATOR: ${{ secrets.STAGING_DATABASE_URL_MIGRATOR }}
        run: pnpm --filter @tenora/db exec prisma migrate deploy

      - name: Verificar sincronia das migrations (staging)
        id: migration-status-staging
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL_MIGRATOR }}
          DATABASE_URL_MIGRATOR: ${{ secrets.STAGING_DATABASE_URL_MIGRATOR }}
        run: pnpm --filter @tenora/db exec prisma migrate status

      - name: Notificar divergência de migrations no Slack (staging)
        if: failure() && steps.migration-status-staging.outcome == 'failure'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "⚠️ *[Tenora] Divergência de migrations detectada no staging!*\n*Workflow:* ${{ github.workflow }}\n*Commit:* `${{ github.sha }}`\n*Author:* ${{ github.actor }}\n*Run:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

      # Deploy api → Render
      - name: Deploy api → Render staging
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'

  # ── Production: requires manual approval via GitHub Environment ──────────
  migrate-prod:
    name: Migrate (production)
    needs: migrate-staging
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production # requires reviewers configured in GitHub UI

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: $(pnpm store path --silent)
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Gerar Prisma Client
        run: pnpm --filter @tenora/db db:generate

      - name: Aplicar migrations (production)
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          DATABASE_URL_MIGRATOR: ${{ secrets.PROD_DATABASE_URL_MIGRATOR }}
        run: pnpm --filter @tenora/db exec prisma migrate deploy

      - name: Verificar sincronia das migrations (production)
        id: migration-status-prod
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL_MIGRATOR }}
          DATABASE_URL_MIGRATOR: ${{ secrets.PROD_DATABASE_URL_MIGRATOR }}
        run: pnpm --filter @tenora/db exec prisma migrate status

      - name: Notificar divergência de migrations no Slack (production)
        if: failure() && steps.migration-status-prod.outcome == 'failure'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🚨 *[Tenora] Divergência de migrations detectada em PRODUCTION!*\n*Workflow:* ${{ github.workflow }}\n*Commit:* `${{ github.sha }}`\n*Author:* ${{ github.actor }}\n*Run:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

      # Deploy api → Render
      - name: Deploy api → Render staging
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'
